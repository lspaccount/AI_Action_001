server:
  port: 8082

spring:
  application:
    name: personal-finance
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:finance;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: true
  session:
    store-type: none
  sql:
    init:
      enabled: true
      schema-locations: classpath:schema.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      table-prefix: t_
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.finance.entity